<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en-us" }}" data-theme="dark">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    {{ partial "header.html" . }}
    <main id="main" class="container">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    <script src="{{ "js/theme.js" | relURL }}"></script>
  </body>
</html>
